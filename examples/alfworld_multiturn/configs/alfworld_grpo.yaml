hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

data:
  max_prompt_length: 8192
  max_response_length: 8192
  train_batch_size: 128
  return_raw_chat: True
  custom_cls:
    path: file://verl_ext/alfworld/runtime_dataset.py
    name: AlfworldRLDataset

reward:
  custom_reward_function:
    path: verl_ext/alfworld/reward.py
    name: compute_score

actor_rollout_ref:
  hybrid_engine: True
  model:
    trust_remote_code: True
    override_config:
      attn_implementation: eager
  actor:
    fsdp_config:
      mixed_precision:
        param_dtype: fp16
        reduce_dtype: fp32
        buffer_dtype: fp32
  ref:
    fsdp_config:
      mixed_precision:
        param_dtype: fp16
        reduce_dtype: fp32
        buffer_dtype: fp32
  rollout:
    dtype: float16
    name: vllm
    multi_turn:
      enable: True
      format: hermes
      max_assistant_turns: 40
      max_parallel_calls: 1
      max_tool_response_length: 4096
      tool_response_truncate_side: middle
      tool_config_path: examples/alfworld_multiturn/configs/tool_config/alfworld_tool_config.yaml
